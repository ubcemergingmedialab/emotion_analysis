<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emotion Lexicon — Hexagon Viewer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div>
      <h1>Emotion Lexicon Viewer</h1>
      <p class="subtitle">Six-emotion hexagon plot for each word in the lexicon</p>
    </div>
    <label class="file-btn">
      Load CSV
      <input type="file" id="file-input" accept=".csv" hidden />
    </label>
  </header>

  <section class="toolbar">
    <input type="search" id="search" placeholder="Search words…" autocomplete="off" />
    <select id="emotion-filter">
      <option value="">All emotions</option>
      <option value="joy">Joy</option>
      <option value="sadness">Sadness</option>
      <option value="anger">Anger</option>
      <option value="fear">Fear</option>
      <option value="love">Love</option>
      <option value="surprise">Surprise</option>
    </select>
    <select id="sort-by">
      <option value="word">Sort: A → Z</option>
      <option value="confidence-desc">Sort: Confidence ↓</option>
      <option value="occurrences-desc">Sort: Occurrences ↓</option>
    </select>
    <span id="count-label" class="count-label"></span>
  </section>

  <main class="layout">
    <div class="detail-column">
      <div class="detail-panel-slot" id="detail-panel-slot" aria-hidden="true"></div>
      <div class="sidebar-panel" id="sidebar-panel">
        <aside class="detail-panel" id="detail-panel">
          <p class="placeholder">Select a word from the grid or search to inspect its emotion hexagon.</p>
        </aside>
        <section class="light-room" id="light-room" aria-label="Room light preview">
          <div class="light-room-header">
            <div class="light-room-heading">
              <h2 class="light-room-title">Room lights</h2>
              <label class="light-strategy-label">
                Strategy
                <select id="light-strategy" class="light-strategy-select" aria-label="Light update strategy"></select>
              </label>
            </div>
            <p class="light-room-hint" id="light-strategy-summary">Click words in the grid to add or remove them from the room.</p>
          </div>
          <div class="light-grid" id="light-grid"></div>
          <div class="light-room-footer">
            <div class="word-tray-wrap">
              <div class="word-tray-header">
                <h3 class="word-tray-title">Selected words</h3>
                <button type="button" class="clear-room-btn" id="clear-room" disabled>Clear all</button>
              </div>
              <div class="word-tray" id="word-tray">
                <p class="word-tray-empty">No words in the room yet.</p>
              </div>
            </div>
            <div class="blend-readout" id="blend-readout"></div>
          </div>
        </section>
      </div>
    </div>
    <div class="grid-wrap">
      <div id="grid" class="grid"></div>
    </div>
  </main>

  <footer class="footer">
    <span id="status">Loading lexicon…</span>
  </footer>

  <script src="light-strategies.js"></script>
  <script src="app.js"></script>
</body>
</html>
